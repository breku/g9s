version: 2

project_name: gcptui

before:
  hooks:
    - go mod tidy

builds:
  - id: gcptui
    main: ./main.go
    binary: gcptui
    ldflags:
      - -s -w
      - -X github.com/brekol/gcp-terminal-dashboard/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: gcptui
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: gcptui
    repository:
      owner: brekol
      name: homebrew-tap
    homepage: https://github.com/brekol/gcp-terminal-dashboard
    description: "Terminal dashboard for GCP resources, similar to k9s"
    license: "MIT"
    install: |
      bin.install "gcptui"
    test: |
      system "#{bin}/gcptui version"
