version: 2

project_name: g9s

before:
  hooks:
    - go mod tidy

builds:
  - id: g9s
    main: ./main.go
    binary: g9s
    ldflags:
      - -s -w
      - -X github.com/brekol/g9s/cmd.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: g9s
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
