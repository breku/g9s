# Builds cross-platform binaries and publishes a GitHub Release whenever a
# semver tag of the form vX.Y.Z (or vX.Y.Z-pre.N) is pushed.
#
# Trigger manually:
#   git tag -a v0.1.0 -m "Initial release"
#   git push origin v0.1.0
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release and upload artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # goreleaser needs the full history to generate the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
